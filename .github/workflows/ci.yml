name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Build, test, self-analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build
        run: dotnet build -c Release

      - name: Test
        run: dotnet test -c Release --no-build

      - name: Self-analysis
        run: dotnet run --project src/MessSharp -c Release --no-build -- ./src text csharp --ignore-tests
